# Next.js no Netlify (OpenNext / plugin oficial): o build gera as funções serverless das rotas /api.
#
# Se aparecer HTTP 502 ao gerar documentos:
# - Veja Site → Functions (ou Deploy log): erro na função, cold start ou timeout.
# - Confirme que o último deploy concluiu sem falha e que NODE_VERSION bate com o projeto.
# Variáveis de app: veja .env.example (ex.: DOCFLOW_DATA_DIR em ambientes persistentes).

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
